name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format
        run: cargo fmt --check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # fuser is built with default-features = false, so it mounts via the
      # fusermount binary at runtime rather than linking libfuse at build time.
      # No system libraries are needed to compile clippy/test. The FUSE e2e
      # tests are #[ignore]d (they need root + /dev/fuse), so cargo test only
      # exercises the in-process suite here.
      - name: Clippy
        run: cargo clippy --all-targets --locked -- -D warnings
      - name: Test
        run: cargo test --locked

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The #[ignore]d FUSE end-to-end suite needs a real /dev/fuse and the
      # setuid fusermount3 helper. ubuntu-latest provides /dev/fuse and allows
      # the runner user to mount FUSE, so the suite runs directly on the host;
      # fuse3 supplies fusermount3. scripts/fuse-e2e.sh is the same entry point
      # used locally (and inside the Podman harness).
      - name: Install fuse3
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3
      - name: FUSE e2e
        run: bash scripts/fuse-e2e.sh
